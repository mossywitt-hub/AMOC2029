<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>When The Sea Slows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#faf7f0; --paper-deep:#f2efe6; --paper-card:#fffdf8;
  --ink:#26221a; --ink-2:#3a352a; --ink-3:#463f31; --ink-4:#56503f;
  --muted:#8a8268; --faint:#9a907a; --line:#e2dccb; --line-2:#e0d8c4;
  --navy:#1c2b3a; --navy-2:#34465a; --navy-ink:#eef1f3; --navy-muted:#9fb0bd; --navy-faint:#7d94a6;
  --steel:#5b8fb0; --sage:#6f9a78; --sage-bg:#e8efe6; --sage-line:#bcd0bd;
  --clay:#c08a3c; --clay-deep:#7a4f1c; --clay-bg:#f5e8d4; --clay-line:#e2c79f;
  --alarm:#9a3a2a; --alarm-bg:#f3ddd6; --alarm-line:#dcae9f;
  --serif:'Newsreader',Georgia,serif; --sans:'Spline Sans',-apple-system,sans-serif; --mono:'Spline Sans Mono',monospace;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:#f7f5f0;color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;}
.gate{position:fixed;inset:0;z-index:1000;background:#1c2b3a;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.gate-card{max-width:420px;width:100%;background:#faf7f0;border:0.5px solid #d8d0bb;box-shadow:0 10px 50px rgba(0,0,0,0.35);padding:2.6rem 2.4rem 2.4rem;text-align:center;}
.gate-seal{width:30px;height:30px;margin:0 auto 1.4rem;border:1.5px solid #2c3e50;display:flex;align-items:center;justify-content:center;}
.gate-seal span{width:12px;height:12px;background:#5b7fa6;display:block;}
.gate-kicker{font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:0.18em;color:#9a8f6f;margin-bottom:1rem;}
.gate-title{font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:30px;line-height:1.05;color:#1f1b14;margin:0 0 1rem;}
.gate-note{font-family:'Spline Sans',system-ui,sans-serif;font-size:13.5px;line-height:1.6;color:#5a5343;margin:0 0 1.6rem;}
.gate-row{display:flex;gap:8px;}
.gate-row input{flex:1;font-family:'Spline Sans',system-ui,sans-serif;font-size:14px;color:#1f1b14;background:#fff;border:0.5px solid #cfc6ad;padding:11px 13px;}
.gate-row input:focus{outline:none;border-color:#5b7fa6;}
.gate-row button{font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:0.06em;color:#faf7f0;background:#1c2b3a;border:none;padding:0 18px;cursor:pointer;transition:background .2s;}
.gate-row button:hover{background:#2c3e50;}
.gate-err{font-family:'Spline Sans',system-ui,sans-serif;font-size:12.5px;color:#9a3a2a;min-height:1.1em;margin:0.9rem 0 0;}
.frame{max-width:1180px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 60px rgba(40,34,26,0.12);}
.hidden{display:none !important;}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:0.13em;color:var(--muted);}
button{font-family:inherit;}

/* masthead */
.masthead{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;background:var(--navy);padding:11px 2.5rem;}
.seal{width:22px;height:22px;border:1.5px solid #c9d4dc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.seal i{width:8px;height:8px;background:var(--steel);display:block;}
.dept{font-family:var(--sans);font-size:12px;letter-spacing:0.13em;color:var(--navy-ink);font-weight:500;}
.nav-ref{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--navy-faint);letter-spacing:0.13em;margin-left:6px;}
.nav-links{display:flex;gap:4px;margin-left:auto;}
.nav-link{font-family:var(--mono);font-size:11px;color:var(--navy-faint);background:none;border:none;cursor:pointer;letter-spacing:0.08em;padding:4px 10px;transition:color .2s,background .2s;text-transform:uppercase;}
.nav-link:hover{color:var(--navy-ink);}
.nav-link.active{color:var(--navy-ink);background:#2c3e50;}

/* landing */
.landing{background:var(--paper);padding:3rem 2.5rem 2.75rem;}
.landing-inner{max-width:960px;margin:0 auto;}
.title{font-family:var(--serif);font-size:clamp(40px,6vw,58px);line-height:1.05;color:var(--ink);letter-spacing:-0.015em;margin:1.1rem 0 1.6rem;}
.title-row{position:relative;}
.todo-note{position:absolute;top:-14px;right:240px;width:178px;background:linear-gradient(170deg,#ffe14d 0%,#ffd83a 55%,#fbcf2e 100%);padding:16px 16px 18px;transform:rotate(2.4deg);box-shadow:0 1px 1px rgba(0,0,0,0.04),0 10px 22px rgba(80,66,20,0.18),0 18px 40px rgba(80,66,20,0.10);z-index:30;}
.todo-note::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.35),rgba(255,255,255,0) 40%);pointer-events:none;}
.todo-tape{position:absolute;top:-13px;left:50%;transform:translateX(-50%) rotate(-1.5deg);width:78px;height:26px;background:rgba(214,228,201,0.55);border-left:1px dashed rgba(255,255,255,0.5);border-right:1px dashed rgba(255,255,255,0.5);box-shadow:0 1px 2px rgba(0,0,0,0.06);}
.todo-title{font-family:'Caveat',cursive;font-size:27px;font-weight:700;color:#5b4a12;line-height:1;margin-bottom:9px;letter-spacing:0.01em;}
.todo-list{list-style:none;margin:0;padding:0;}
.todo-list li{font-family:'Caveat',cursive;font-size:19px;font-weight:500;color:#6a5715;line-height:1.5;padding-left:22px;position:relative;}
.todo-list li::before{content:"";position:absolute;left:0;top:9px;width:10px;height:10px;border:1.5px solid #9a8330;border-radius:1px;}
.cta-row{display:flex;align-items:center;gap:18px;margin-bottom:2.4rem;flex-wrap:wrap;}
.cta{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-size:15px;font-weight:500;letter-spacing:0.02em;color:var(--paper);background:var(--navy);border:none;cursor:pointer;padding:14px 30px;transition:transform .15s,background .2s;}
.cta:hover{background:#26384b;transform:translateY(-1px);}
.cta i{font-style:normal;font-size:17px;}
.cta-note{font-family:var(--mono);font-size:11px;color:var(--faint);}
.lede{margin-bottom:2.4rem;}
.lede p{font-family:var(--serif);font-size:17px;line-height:1.62;color:var(--ink-3);margin:0 0 1.1rem;}
.lede p.first{font-size:20px;line-height:1.55;color:var(--ink);}
.lede p.pivot{font-size:20px;color:var(--ink);}
.frame-note{border-top:0.5px solid var(--line);padding-top:1.5rem;margin-bottom:2.75rem;}
.frame-note p{font-family:var(--sans);font-size:14px;line-height:1.78;color:var(--ink-4);margin:0;}
.intro-below{border-top:0.5px solid var(--line);padding-top:1.75rem;margin-bottom:2.75rem;}
/* homepage ledger rail: reuse scene read-wrap, but contained within landing-inner */
.home-wrap{background:transparent;}
.home-col{flex:1;min-width:0;max-width:none;padding:0;}
.home-col .intro-below{margin-bottom:2.2rem;}
.home-wrap .ledger{width:228px;background:var(--paper-deep);border-left:0.5px solid var(--line);margin-left:2rem;}
.home-wrap .ledger-pin{top:84px;}
.intro-below p{font-family:var(--sans);font-size:14.5px;line-height:1.8;color:var(--ink-4);margin:0 0 1.1rem;max-width:680px;}
.intro-below p:last-child{margin-bottom:0;}
.scenes-head{display:flex;align-items:baseline;gap:10px;margin-bottom:1.1rem;flex-wrap:wrap;}
/* STORY MAP — flow diagram (page-level ledger now lives in the rail) */
.mapband{border:0.5px solid var(--line);background:var(--paper-card);margin-top:0.5rem;}
.mapwrap{position:relative;padding:1.5rem 1.5rem 1.75rem;min-width:0;}
.map-kicker{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;color:var(--muted);margin-bottom:1.25rem;}
.flow{position:relative;}
.flow svg.links{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.tier{display:flex;justify-content:center;flex-wrap:nowrap;gap:12px;position:relative;z-index:1;margin-bottom:44px;}
.tier:last-child{margin-bottom:0;}
.node{position:relative;background:var(--paper-card);border:0.5px solid var(--line-2);border-left-width:3px;padding:9px 12px;cursor:pointer;text-align:left;min-width:0;flex:0 1 auto;transition:transform .15s,box-shadow .2s;font-family:inherit;}
.node:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(60,55,40,0.08);}
.node .n-num{display:block;font-family:var(--mono);font-size:9px;letter-spacing:0.14em;color:var(--faint);margin-bottom:3px;}
.node .n-name{display:block;font-family:var(--serif);font-size:14px;line-height:1.15;color:var(--ink);}
.node.s0{border-left-color:var(--navy);}
.node.s1{border-left-color:var(--steel);}
.node.s2{border-left-color:#7a6cae;}
.node.s3{border-left-color:var(--sage);}
.node.s4{border-left-color:#b0894d;}
.node.s5{border-left-color:var(--clay);}
.node.s6{border-left-color:#9a3a2a;}
.outcomes-tier{gap:14px;margin-top:6px;}
.onode{flex:1;max-width:240px;border:1.5px solid;padding:14px 16px;cursor:pointer;text-align:left;background:var(--paper-card);transition:transform .15s,box-shadow .2s;font-family:inherit;}
.onode:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(60,55,40,0.1);}
.onode .o-cond{display:block;font-family:var(--mono);font-size:9px;letter-spacing:0.14em;margin-bottom:5px;}
.onode .o-name{display:block;font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.1;}
.onode.good{border-color:var(--sage-line);background:var(--sage-bg);}
.onode.good .o-cond{color:var(--sage);} .onode.good .o-name{color:#3f6b48;}
.onode.bad{border-color:var(--clay-line);background:var(--clay-bg);}
.onode.bad .o-cond{color:var(--clay-deep);} .onode.bad .o-name{color:#8a4a2a;}
/* baseline ledger rail additions (reuses scene .ledger / .lrow / .ll / .lv / .lbar) */
.ledger .lstate{display:flex;gap:6px;align-items:center;}
.ledger .lchip{font-family:var(--mono);font-size:11px;padding:2px 9px;background:var(--sage-bg);border:0.5px solid var(--sage-line);color:#3f6b48;letter-spacing:0.04em;}
.ledger .ledger-foot{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;color:var(--faint);margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--line);line-height:1.5;}
.ledger .lrow.infra .lstate{margin-top:2px;}

/* footer blocks */
.footer-stack{background:var(--paper);}
.fblock{border-top:0.5px solid var(--line);}
.fblock.navy{background:var(--navy);border-top:0.5px solid var(--navy-2);}
.fblock.deep{background:var(--paper-deep);}
.fblock-head{width:100%;max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:14px;background:none;border:none;cursor:pointer;text-align:left;padding:1.5rem 2.5rem;transition:background .2s;}
.fblock.deep .fblock-head:hover{background:#ece8dc;}
.fblock.navy .fblock-head:hover{background:#223447;}
.fblock-head .fk{font-family:var(--mono);font-size:11px;letter-spacing:0.13em;color:var(--muted);}
.fblock.navy .fblock-head .fk{color:var(--navy-faint);}
.fblock-head .ftitle{font-family:var(--serif);font-size:20px;color:var(--ink);}
.fblock.navy .fblock-head .ftitle{color:var(--navy-ink);}
.fblock-head .chev{margin-left:auto;font-size:18px;color:var(--faint);transition:transform .3s;}
.fblock.navy .fblock-head .chev{color:var(--navy-faint);}
.fblock.open .chev{transform:rotate(180deg);}
.fblock-body{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.fblock.open .fblock-body{max-height:3000px;}
.fblock-inner{max-width:1040px;margin:0 auto;padding:0 2.5rem 2.25rem;}
.cs p{font-family:var(--sans);font-size:14.5px;line-height:1.8;color:var(--ink-3);margin:0 0 1.1rem;max-width:760px;}
.cs blockquote{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.55;color:var(--ink-2);margin:0 0 1.4rem;padding-left:1.2rem;border-left:2px solid #c9bfa3;max-width:700px;}
.why-list{margin:0 0 1.1rem;padding-left:1.1rem;max-width:760px;}
.why-list li{font-family:var(--sans);font-size:14.5px;line-height:1.7;color:var(--ink-3);margin-bottom:0.5rem;}
.resources{display:none;background:var(--paper);padding:3rem 2.5rem 3.5rem;}
.resources.active{display:block;}
.res-inner{max-width:960px;margin:0 auto;}
.res-kicker{font-family:var(--mono);font-size:11px;letter-spacing:0.13em;color:var(--muted);margin-bottom:1rem;}
.res-title{font-family:var(--serif);font-size:clamp(34px,5vw,46px);line-height:1.06;color:var(--ink);margin:0 0 0.6rem;}
.res-intro{font-family:var(--serif);font-size:18px;line-height:1.55;color:var(--ink-2);max-width:720px;margin:0 0 2.5rem;}
.res-section{border-top:0.5px solid var(--line);padding-top:1.75rem;margin-bottom:2.5rem;}
.res-section h3{font-family:var(--serif);font-size:24px;color:var(--ink);margin:0 0 1rem;}
.res-section p{font-family:var(--sans);font-size:14.5px;line-height:1.8;color:var(--ink-3);margin:0 0 1.1rem;max-width:760px;}
.res-section blockquote{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.55;color:var(--ink-2);margin:0 0 1.4rem;padding-left:1.2rem;border-left:2px solid #c9bfa3;max-width:700px;}
.res-placeholder{font-family:var(--mono);font-size:12px;color:var(--faint);background:var(--paper-deep);border:0.5px dashed #cfc8b6;padding:1rem 1.2rem;margin-bottom:1.1rem;}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem 2rem;}
.member .m-name{font-family:var(--serif);font-size:16px;color:var(--navy-ink);margin-bottom:5px;}
.member .m-bio{font-family:var(--sans);font-size:13px;line-height:1.65;color:var(--navy-muted);}
.member.lead{grid-column:1/-1;border-top:0.5px solid var(--navy-2);padding-top:1.25rem;margin-top:0.25rem;}
.form-grid{max-width:520px;}
.field{margin-bottom:1.1rem;}
.fblock.navy .field label{color:var(--navy-faint);}
.fblock.navy .form-note{color:var(--navy-faint);}
.fblock.navy .cs p{color:#d6dee6;}
.fblock.navy .cs blockquote{color:#e7edf2;border-left-color:#5b7fa6;}
.fblock.navy .cs blockquote span{color:#9fb2c4 !important;}
.fblock.navy .why-list li{color:#d6dee6;}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;}
.field input,.field textarea{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--paper-card);border:0.5px solid var(--line-2);padding:11px 13px;transition:border-color .2s;resize:vertical;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--steel);}
.form-submit{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--paper);background:var(--navy);border:none;cursor:pointer;padding:12px 26px;}
.form-note{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:0.9rem;}

/* reader */
.reader{display:none;} .reader.active{display:block;}
.rail{background:var(--navy);padding:0.8rem 2.5rem;display:flex;align-items:center;gap:14px;position:sticky;top:44px;z-index:40;}
.rail .rk{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--navy-faint);}
.rail-bars{display:flex;gap:6px;flex:1;}
.rail-bars .rb{flex:1;height:3px;background:var(--navy-2);cursor:pointer;transition:background .25s;}
.rail-bars .rb.done{background:var(--navy-faint);} .rail-bars .rb.cur{background:var(--steel);}
.rail-bars .rb:hover{background:#c9d4dc;}
.rail .rnext{font-family:var(--sans);font-size:11px;color:var(--navy-muted);}
.read-wrap{display:flex;background:var(--paper);align-items:stretch;}
.read-col{flex:1;min-width:0;padding:2.75rem 2.5rem 3rem;max-width:760px;}
.scene-tag{display:flex;align-items:baseline;gap:10px;margin-bottom:0.6rem;}
.scene-tag .snum{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--muted);}
.scene-title{font-family:var(--serif);font-size:clamp(28px,4vw,38px);line-height:1.12;color:var(--ink);margin:0 0 1.8rem;}
.scene-body p{font-family:var(--sans);font-size:16px;line-height:1.82;color:var(--ink-3);margin:0 0 1.2rem;}
.scene-body p.lead{font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--ink-2);}
.scene-body p.italic{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink-2);padding-left:1.1rem;border-left:2px solid var(--line-2);}

/* MEMO inset — looks like the first page of an agency memo */
.memo{margin:2rem 0;background:#f6f3ea;border:0.5px solid #d8d0bb;box-shadow:4px 5px 0 rgba(60,55,40,0.08);position:relative;overflow:hidden;}
.memo-top{display:flex;align-items:stretch;border-bottom:1px solid #cfc6ad;background:#efe9d8;}
.memo-seal{display:flex;align-items:center;gap:9px;padding:12px 16px;border-right:1px solid #cfc6ad;}
.memo-seal .ms-mark{width:26px;height:26px;border:1.5px solid #8a8268;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.memo-seal .ms-mark i{width:9px;height:9px;background:#8a8268;border-radius:50%;display:block;font-style:normal;}
.memo-seal .ms-txt{font-family:var(--mono);font-size:9px;line-height:1.3;letter-spacing:0.08em;color:#6f6850;}
.memo-meta{display:flex;flex:1;flex-wrap:wrap;}
.memo-meta .mm{flex:1;min-width:84px;padding:8px 14px;border-right:1px solid #ddd5bf;}
.memo-meta .mm:last-child{border-right:none;}
.memo-meta .mm .mk{font-family:var(--mono);font-size:8.5px;letter-spacing:0.1em;color:#a0987e;display:block;margin-bottom:2px;}
.memo-meta .mm .mv{font-family:var(--mono);font-size:11px;color:#4d4836;}
.memo-class{background:#e7dcc4;border-bottom:1px solid #cfc6ad;padding:5px 16px;font-family:var(--mono);font-size:9px;letter-spacing:0.22em;color:#7a6f50;text-align:center;}
.memo-body{padding:1.5rem 1.7rem 1.2rem;}
.memo-doctitle{font-family:var(--serif);font-size:21px;color:#2c281d;margin:0 0 0.2rem;}
.memo-section{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:#8a8268;margin-bottom:1.1rem;}
.memo-body p{font-family:var(--serif);font-size:14px;line-height:1.68;color:#3a352a;margin:0 0 0.9rem;}
.memo-body p:last-of-type{margin-bottom:0;color:#5c5642;}
.memo-fade{height:64px;background:linear-gradient(to bottom,rgba(246,243,234,0),#f6f3ea);margin-top:-64px;position:relative;pointer-events:none;}
.memo-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-top:1px solid #cfc6ad;background:#efe9d8;}
.memo-foot span{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;color:#8a8268;}

/* NEWSPAPER front-page inset */
.news{margin:2rem 0;background:#efece2;border:0.5px solid #cfc8b6;box-shadow:4px 5px 0 rgba(60,55,40,0.08);position:relative;overflow:hidden;padding:1.5rem 1.6rem 0;}
.news-nameplate{text-align:center;border-bottom:3px double #2c281d;padding-bottom:8px;margin-bottom:0;}
.news-rule-line{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:9px;letter-spacing:0.12em;color:#6f6850;text-transform:uppercase;}
.news-title{font-family:var(--serif);font-weight:500;font-size:clamp(34px,6vw,52px);line-height:1;color:#211d16;letter-spacing:-0.01em;margin:4px 0 6px;}
.news-dateline{border-top:1px solid #cfc8b6;padding-top:6px;margin-top:2px;}

/* ---- story-map connector lines (computed from rendered node positions) ---- */
const FLOW_EDGES=[
  [0,1],[0,2],[0,3],[0,4],
  [1,5],[2,5],[3,5],[4,5],
  [5,6],
  [6,"good"],[6,"bad"]
];
function flowNode(ref){
  if(ref==="good")return document.querySelector('.onode.good');
  if(ref==="bad")return document.querySelector('.onode.bad');
  return document.querySelector('.node[data-scene="'+ref+'"]');
}
function drawFlowLinks(){
  const flow=document.getElementById("flow");
  const svg=document.getElementById("flowLinks");
  if(!flow||!svg)return;
  const fr=flow.getBoundingClientRect();
  if(fr.width===0)return;
  svg.setAttribute("viewBox",`0 0 ${fr.width} ${fr.height}`);
  let paths="";
  FLOW_EDGES.forEach(([a,b])=>{
    const ea=flowNode(a),eb=flowNode(b);
    if(!ea||!eb)return;
    const ra=ea.getBoundingClientRect(),rb=eb.getBoundingClientRect();
    const x1=ra.left+ra.width/2-fr.left, y1=ra.bottom-fr.top;
    const x2=rb.left+rb.width/2-fr.left, y2=rb.top-fr.top;
    const my=(y1+y2)/2;
    paths+=`<path d="M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}" fill="none" stroke="#cfc6ad" stroke-width="1.25"/>`;
  });
  svg.innerHTML=paths;
}
window.addEventListener("resize",()=>{ if($("#landing")&&!$("#landing").classList.contains("hidden")) drawFlowLinks(); });

function advanceScene(){
  if(scrollAdvancing)return;
  scrollAdvancing=true;hideCue();
  if(current<D.scenes.length-1){openScene(current+1);}

  setTimeout(()=>{scrollAdvancing=false;},150);
}
let atBottomSince=0;
function onReaderScroll(){
  if(!$("#reader").classList.contains("active")){hideCue();return;}
  if(scrollAdvancing||!scrollArmed)return;
  const reader=$("#reader");
  const rect=reader.getBoundingClientRect();
  const remaining=rect.bottom-window.innerHeight;
  if(remaining<150){showCue();}else{hideCue();atBottomSince=0;}
}
// deliberate downward scroll while already at the bottom advances (overscroll intent)
function onWheelIntent(e){
  if(!$("#reader").classList.contains("active"))return;
  if(scrollAdvancing||!scrollArmed)return;
  if(e.deltaY<=0)return; // only downward
  const reader=$("#reader");
  const remaining=reader.getBoundingClientRect().bottom-window.innerHeight;
  if(remaining<4){
    const now=Date.now();
    if(atBottomSince===0){atBottomSince=now;return;}
    if(now-atBottomSince>120){advanceScene();atBottomSince=0;}
  }
}
window.addEventListener("scroll",onReaderScroll,{passive:true});
