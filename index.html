<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>When The Sea Slows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#faf7f0; --paper-deep:#f2efe6; --paper-card:#fffdf8;
  --ink:#26221a; --ink-2:#3a352a; --ink-3:#463f31; --ink-4:#56503f;
  --muted:#8a8268; --faint:#9a907a; --line:#e2dccb; --line-2:#e0d8c4;
  --navy:#1c2b3a; --navy-2:#34465a; --navy-ink:#eef1f3; --navy-muted:#9fb0bd; --navy-faint:#7d94a6;
  --steel:#5b8fb0; --sage:#6f9a78; --sage-bg:#e8efe6; --sage-line:#bcd0bd;
  --clay:#c08a3c; --clay-deep:#7a4f1c; --clay-bg:#f5e8d4; --clay-line:#e2c79f;
  --alarm:#9a3a2a; --alarm-bg:#f3ddd6; --alarm-line:#dcae9f;
  --serif:'Newsreader',Georgia,serif; --sans:'Spline Sans',-apple-system,sans-serif; --mono:'Spline Sans Mono',monospace;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:#f7f5f0;color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;}
.gate{position:fixed;inset:0;z-index:1000;background:#1c2b3a;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.gate-card{max-width:420px;width:100%;background:#faf7f0;border:0.5px solid #d8d0bb;box-shadow:0 10px 50px rgba(0,0,0,0.35);padding:2.6rem 2.4rem 2.4rem;text-align:center;}
.gate-seal{width:30px;height:30px;margin:0 auto 1.4rem;border:1.5px solid #2c3e50;display:flex;align-items:center;justify-content:center;}
.gate-seal span{width:12px;height:12px;background:#5b7fa6;display:block;}
.gate-kicker{font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:0.18em;color:#9a8f6f;margin-bottom:1rem;}
.gate-title{font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:30px;line-height:1.05;color:#1f1b14;margin:0 0 1rem;}
.gate-note{font-family:'Spline Sans',system-ui,sans-serif;font-size:13.5px;line-height:1.6;color:#5a5343;margin:0 0 1.6rem;}
.gate-row{display:flex;gap:8px;}
.gate-row input{flex:1;font-family:'Spline Sans',system-ui,sans-serif;font-size:14px;color:#1f1b14;background:#fff;border:0.5px solid #cfc6ad;padding:11px 13px;}
.gate-row input:focus{outline:none;border-color:#5b7fa6;}
.gate-row button{font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:0.06em;color:#faf7f0;background:#1c2b3a;border:none;padding:0 18px;cursor:pointer;transition:background .2s;}
.gate-row button:hover{background:#2c3e50;}
.gate-err{font-family:'Spline Sans',system-ui,sans-serif;font-size:12.5px;color:#9a3a2a;min-height:1.1em;margin:0.9rem 0 0;}
.frame{max-width:1180px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 60px rgba(40,34,26,0.12);}
.hidden{display:none !important;}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:0.13em;color:var(--muted);}
button{font-family:inherit;}

/* masthead */
.masthead{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;background:var(--navy);padding:11px 2.5rem;}
.seal{width:22px;height:22px;border:1.5px solid #c9d4dc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.seal i{width:8px;height:8px;background:var(--steel);display:block;}
.dept{font-family:var(--sans);font-size:12px;letter-spacing:0.13em;color:var(--navy-ink);font-weight:500;}
.nav-ref{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--navy-faint);letter-spacing:0.13em;margin-left:6px;}
.nav-links{display:flex;gap:4px;margin-left:auto;}
.nav-link{font-family:var(--mono);font-size:11px;color:var(--navy-faint);background:none;border:none;cursor:pointer;letter-spacing:0.08em;padding:4px 10px;transition:color .2s,background .2s;text-transform:uppercase;}
.nav-link:hover{color:var(--navy-ink);}
.nav-link.active{color:var(--navy-ink);background:#2c3e50;}

/* landing */
.landing{background:var(--paper);padding:3rem 2.5rem 2.75rem;}
.landing-inner{max-width:960px;margin:0 auto;}
.title{font-family:var(--serif);font-size:clamp(40px,6vw,58px);line-height:1.05;color:var(--ink);letter-spacing:-0.015em;margin:1.1rem 0 0.5rem;}
.subtitle{font-family:var(--serif);font-style:italic;font-size:clamp(16px,2vw,20px);color:var(--muted);margin:0 0 1.6rem;}
.title-row{position:relative;}
.todo-note{position:absolute;top:-14px;right:240px;width:178px;background:linear-gradient(170deg,#ffe14d 0%,#ffd83a 55%,#fbcf2e 100%);padding:16px 16px 18px;transform:rotate(2.4deg);box-shadow:0 1px 1px rgba(0,0,0,0.04),0 10px 22px rgba(80,66,20,0.18),0 18px 40px rgba(80,66,20,0.10);z-index:30;}
.todo-note::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.35),rgba(255,255,255,0) 40%);pointer-events:none;}
.todo-tape{position:absolute;top:-13px;left:50%;transform:translateX(-50%) rotate(-1.5deg);width:78px;height:26px;background:rgba(214,228,201,0.55);border-left:1px dashed rgba(255,255,255,0.5);border-right:1px dashed rgba(255,255,255,0.5);box-shadow:0 1px 2px rgba(0,0,0,0.06);}
.todo-title{font-family:'Caveat',cursive;font-size:27px;font-weight:700;color:#5b4a12;line-height:1;margin-bottom:9px;letter-spacing:0.01em;}
.todo-list{list-style:none;margin:0;padding:0;}
.todo-list li{font-family:'Caveat',cursive;font-size:19px;font-weight:500;color:#6a5715;line-height:1.5;padding-left:22px;position:relative;}
.todo-list li::before{content:"";position:absolute;left:0;top:9px;width:10px;height:10px;border:1.5px solid #9a8330;border-radius:1px;}
.cta-row{display:flex;align-items:center;gap:18px;margin-bottom:2.4rem;flex-wrap:wrap;}
.cta{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-size:15px;font-weight:500;letter-spacing:0.02em;color:var(--paper);background:var(--navy);border:none;cursor:pointer;padding:14px 30px;transition:transform .15s,background .2s;}
.cta:hover{background:#26384b;transform:translateY(-1px);}
.cta i{font-style:normal;font-size:17px;}
.cta-note{font-family:var(--mono);font-size:11px;color:var(--faint);}
.lede{margin-bottom:2.4rem;}
.lede p{font-family:var(--serif);font-size:17px;line-height:1.62;color:var(--ink-3);margin:0 0 1.1rem;}
.lede p.first{font-size:20px;line-height:1.55;color:var(--ink);}
.lede p.pivot{font-size:20px;color:var(--ink);}
/* hover footnotes */
.fn{position:relative;display:inline-block;cursor:pointer;outline:none;}
.fn::after{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);width:48px;height:12px;} /* hover bridge across the gap to the card */
.fn sup{font-family:var(--mono);font-size:0.62em;color:var(--steel);padding:0 1px;transition:color .15s;}
.fn:hover sup,.fn:focus sup,.fn:focus-within sup{color:var(--navy);}
.fn .fn-pop{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);width:max-content;max-width:300px;background:var(--paper-card);border:0.5px solid var(--line-2);box-shadow:4px 5px 0 rgba(60,55,40,0.08),0 10px 28px rgba(40,34,26,0.12);padding:9px 12px 10px;z-index:60;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;font-family:var(--sans);font-style:normal;font-size:12.5px;line-height:1.55;color:var(--ink-3);text-align:left;white-space:normal;}
.fn .fn-pop::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%) translateY(-4.5px) rotate(45deg);width:8px;height:8px;background:var(--paper-card);border-right:0.5px solid var(--line-2);border-bottom:0.5px solid var(--line-2);}
.fn:hover .fn-pop,.fn:focus .fn-pop,.fn:focus-within .fn-pop{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
.fn .fn-k{display:block;font-family:var(--mono);font-size:8.5px;letter-spacing:0.16em;color:var(--muted);margin-bottom:4px;}
.fn .fn-pop a{color:var(--steel);text-decoration:underline;text-underline-offset:2px;transition:color .15s;}
.fn .fn-pop a:hover{color:var(--navy);}
.frame-note{border-top:0.5px solid var(--line);padding-top:1.5rem;margin-bottom:2.75rem;}
.frame-note p{font-family:var(--sans);font-size:14px;line-height:1.78;color:var(--ink-4);margin:0;}
.intro-below{border-top:0.5px solid var(--line);padding-top:1.75rem;margin-bottom:2.75rem;}
/* homepage ledger rail: reuse scene read-wrap, but contained within landing-inner */
.home-wrap{background:transparent;}
.home-col{flex:1;min-width:0;max-width:none;padding:0;}
.home-col .intro-below{margin-bottom:2.2rem;}
.home-wrap .ledger{width:228px;background:var(--paper-deep);border-left:0.5px solid var(--line);margin-left:2rem;}
.home-wrap .ledger-pin{top:84px;}
.intro-below p{font-family:var(--sans);font-size:14.5px;line-height:1.8;color:var(--ink-4);margin:0 0 1.1rem;max-width:680px;}
.intro-below p:last-child{margin-bottom:0;}
.scenes-head{display:flex;align-items:baseline;gap:10px;margin-bottom:1.1rem;flex-wrap:wrap;}
/* STORY MAP — flow diagram (page-level ledger now lives in the rail) */
.mapband{border:0.5px solid var(--line);background:var(--paper-card);margin-top:0.5rem;}
.mapwrap{position:relative;padding:1.5rem 1.5rem 1.75rem;min-width:0;}
.map-kicker{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;color:var(--muted);margin-bottom:1.25rem;}
.flow{position:relative;}
.flow svg.links{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.tier{display:flex;justify-content:center;flex-wrap:nowrap;gap:12px;position:relative;z-index:1;margin-bottom:44px;}
.tier:last-child{margin-bottom:0;}
.node{position:relative;background:var(--paper-card);border:0.5px solid var(--line-2);border-left-width:3px;padding:9px 12px;cursor:pointer;text-align:left;min-width:0;flex:0 1 auto;transition:transform .15s,box-shadow .2s;font-family:inherit;}
.node:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(60,55,40,0.08);}
.node .n-num{display:block;font-family:var(--mono);font-size:9px;letter-spacing:0.14em;color:var(--faint);margin-bottom:3px;}
.node .n-name{display:block;font-family:var(--serif);font-size:14px;line-height:1.15;color:var(--ink);}
.node.s0{border-left-color:var(--navy);}
.node.s1{border-left-color:var(--steel);}
.node.s2{border-left-color:#7a6cae;}
.node.s3{border-left-color:var(--sage);}
.node.s4{border-left-color:#b0894d;}
.node.s5{border-left-color:var(--clay);}
.node.s6{border-left-color:#9a3a2a;}
.outcomes-tier{gap:14px;margin-top:6px;}
.onode{flex:1;max-width:240px;border:1.5px solid;padding:14px 16px;cursor:pointer;text-align:left;background:var(--paper-card);transition:transform .15s,box-shadow .2s;font-family:inherit;}
.onode:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(60,55,40,0.1);}
.onode .o-cond{display:block;font-family:var(--mono);font-size:9px;letter-spacing:0.14em;margin-bottom:5px;}
.onode .o-name{display:block;font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.1;}
.onode.good{border-color:var(--sage-line);background:var(--sage-bg);}
.onode.good .o-cond{color:var(--sage);} .onode.good .o-name{color:#3f6b48;}
.onode.bad{border-color:var(--clay-line);background:var(--clay-bg);}
.onode.bad .o-cond{color:var(--clay-deep);} .onode.bad .o-name{color:#8a4a2a;}
/* baseline ledger rail additions (reuses scene .ledger / .lrow / .ll / .lv / .lbar) */
.ledger .lstate{display:flex;gap:6px;align-items:center;}
.ledger .lchip{font-family:var(--mono);font-size:11px;padding:2px 9px;background:var(--sage-bg);border:0.5px solid var(--sage-line);color:#3f6b48;letter-spacing:0.04em;}
.ledger .ledger-foot{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;color:var(--faint);margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--line);line-height:1.5;}
.ledger .lrow.infra .lstate{margin-top:2px;}

/* footer blocks */
.footer-stack{background:var(--paper);}
/* site footer */
.site-footer{background:var(--navy);border-top:0.5px solid var(--navy-2);}
.sf-inner{max-width:1040px;margin:0 auto;padding:2.2rem 2.5rem 1.7rem;}
.sf-top{display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;}
.sf-nav{display:flex;gap:4px;flex-wrap:wrap;}
.sf-nav button{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--navy-muted);background:none;border:none;cursor:pointer;padding:6px 14px 6px 0;transition:color .2s;}
.sf-nav button:hover{color:var(--navy-ink);}
.sf-sponsor{display:inline-flex;flex-direction:column;align-items:flex-end;gap:6px;text-decoration:none;}
.sf-sponsor-k{font-family:var(--mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--navy-faint);}
.sf-lockup{display:inline-flex;align-items:center;gap:11px;transition:opacity .2s;}
.sf-sponsor:hover .sf-lockup{opacity:0.82;}
.sf-mark{width:38px;height:38px;flex-shrink:0;}
.sf-mark svg{display:block;width:100%;height:100%;}
.sf-name{font-family:var(--sans);font-weight:600;font-size:21px;letter-spacing:-0.01em;color:var(--navy-ink);line-height:1;}
.sf-bottom{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-top:1.6rem;padding-top:1.1rem;border-top:0.5px solid var(--navy-2);}
.sf-legal{font-family:var(--sans);font-size:11.5px;color:var(--navy-muted);}
.sf-note{font-family:var(--mono);font-size:10px;letter-spacing:0.07em;color:var(--navy-faint);}
@media(max-width:620px){ .sf-inner{padding:1.8rem 1.4rem 1.5rem;} .sf-top{flex-direction:column;align-items:flex-start;gap:1.3rem;} .sf-sponsor{align-items:flex-start;} .sf-nav button{padding-left:0;} }
.fblock{border-top:0.5px solid var(--line);}
.fblock.navy{background:var(--navy);border-top:0.5px solid var(--navy-2);}
.fblock.deep{background:var(--paper-deep);}
.fblock-head{width:100%;max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:14px;background:none;border:none;cursor:pointer;text-align:left;padding:1.5rem 2.5rem;transition:background .2s;}
.fblock.deep .fblock-head:hover{background:#ece8dc;}
.fblock.navy .fblock-head:hover{background:#223447;}
.fblock-head .fk{font-family:var(--mono);font-size:11px;letter-spacing:0.13em;color:var(--muted);}
.fblock.navy .fblock-head .fk{color:var(--navy-faint);}
.fblock-head .ftitle{font-family:var(--serif);font-size:20px;color:var(--ink);}
.fblock.navy .fblock-head .ftitle{color:var(--navy-ink);}
.fblock-head .chev{margin-left:auto;font-size:18px;color:var(--faint);transition:transform .3s;}
.fblock.navy .fblock-head .chev{color:var(--navy-faint);}
.fblock.open .chev{transform:rotate(180deg);}
.fblock-body{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.fblock.open .fblock-body{max-height:3000px;}
.fblock-inner{max-width:1040px;margin:0 auto;padding:0 2.5rem 2.25rem;}
.cs p{font-family:var(--sans);font-size:14.5px;line-height:1.8;color:var(--ink-3);margin:0 0 1.1rem;max-width:760px;}
.cs blockquote{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.55;color:var(--ink-2);margin:0 0 1.4rem;padding-left:1.2rem;border-left:2px solid #c9bfa3;max-width:700px;}
.why-list{margin:0 0 1.1rem;padding-left:1.1rem;max-width:760px;}
.why-list li{font-family:var(--sans);font-size:14.5px;line-height:1.7;color:var(--ink-3);margin-bottom:0.5rem;}
.cs-h{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin:1.6rem 0 0.7rem;}
.fblock.navy .cs-h{color:#9fb2c4;}
.cs p a,.why-list li a{color:var(--steel);text-decoration:underline;text-underline-offset:2px;transition:color .15s;}
.cs p a:hover,.why-list li a:hover{color:var(--navy);}
.fblock.navy .cs p a{color:#9fc2dc;}
.fblock.navy .cs p a:hover{color:var(--navy-ink);}
.fblock.navy .fn sup{color:#9fc2dc;}
.team-intro{font-family:var(--sans);font-size:14.5px;line-height:1.8;color:var(--ink-3);max-width:760px;margin:0 0 1.6rem;}
.resources{display:none;background:var(--paper);padding:3rem 2.5rem 3.5rem;}
.resources.active{display:block;}
.res-inner{max-width:960px;margin:0 auto;}
.res-kicker{font-family:var(--mono);font-size:11px;letter-spacing:0.13em;color:var(--muted);margin-bottom:1rem;}
.res-title{font-family:var(--serif);font-size:clamp(34px,5vw,46px);line-height:1.06;color:var(--ink);margin:0 0 0.6rem;}
.res-intro{font-family:var(--serif);font-size:18px;line-height:1.55;color:var(--ink-2);max-width:720px;margin:0 0 2.5rem;}
.res-section{border-top:0.5px solid var(--line);padding-top:1.75rem;margin-bottom:2.5rem;}
.res-section h3{font-family:var(--serif);font-size:24px;color:var(--ink);margin:0 0 1rem;}
.res-section p{font-family:var(--sans);font-size:14.5px;line-height:1.8;color:var(--ink-3);margin:0 0 1.1rem;max-width:760px;}
.res-section blockquote{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.55;color:var(--ink-2);margin:0 0 1.4rem;padding-left:1.2rem;border-left:2px solid #c9bfa3;max-width:700px;}
.res-placeholder{font-family:var(--mono);font-size:12px;color:var(--faint);background:var(--paper-deep);border:0.5px dashed #cfc8b6;padding:1rem 1.2rem;margin-bottom:1.1rem;}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem 2rem;}
.member .m-name{font-family:var(--serif);font-size:16px;color:var(--ink);margin-bottom:5px;}
.member .m-bio{font-family:var(--sans);font-size:13px;line-height:1.65;color:var(--ink-4);}
.member.lead{grid-column:1/-1;border-top:0.5px solid var(--line-2);padding-top:1.25rem;margin-top:0.25rem;}
.form-grid{max-width:520px;}
.field{margin-bottom:1.1rem;}
.fblock.navy .field label{color:var(--navy-faint);}
.fblock.navy .form-note{color:var(--navy-faint);}
.fblock.navy .cs p{color:#d6dee6;}
.fblock.navy .cs blockquote{color:#e7edf2;border-left-color:#5b7fa6;}
.fblock.navy .cs blockquote span{color:#9fb2c4 !important;}
.fblock.navy .why-list li{color:#d6dee6;}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;}
.field input,.field textarea{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--paper-card);border:0.5px solid var(--line-2);padding:11px 13px;transition:border-color .2s;resize:vertical;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--steel);}
.form-submit{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--paper);background:var(--navy);border:none;cursor:pointer;padding:12px 26px;}
.form-note{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:0.9rem;}

/* reader */
.reader{display:none;} .reader.active{display:block;}
.rail{background:var(--navy);padding:0.8rem 2.5rem;display:flex;align-items:center;gap:14px;position:sticky;top:44px;z-index:40;}
.rail .rk{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--navy-faint);}
.rail-bars{display:flex;gap:6px;flex:1;}
.rail-bars .rb{flex:1;height:3px;background:var(--navy-2);cursor:pointer;transition:background .25s;}
.rail-bars .rb.done{background:var(--navy-faint);} .rail-bars .rb.cur{background:var(--steel);}
.rail-bars .rb:hover{background:#c9d4dc;}
.rail .rnext{font-family:var(--sans);font-size:11px;color:var(--navy-muted);}
.read-wrap{display:flex;background:var(--paper);align-items:stretch;}
.read-col{flex:1;min-width:0;padding:2.75rem 2.5rem 3rem;max-width:760px;}
.scene-tag{display:flex;align-items:baseline;gap:10px;margin-bottom:0.6rem;}
.scene-tag .snum{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--muted);}
.scene-title{font-family:var(--serif);font-size:clamp(28px,4vw,38px);line-height:1.12;color:var(--ink);margin:0 0 1.8rem;}
.scene-body p{font-family:var(--sans);font-size:16px;line-height:1.82;color:var(--ink-3);margin:0 0 1.2rem;}
.scene-body p.lead{font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--ink-2);}
.scene-body p.italic{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink-2);padding-left:1.1rem;border-left:2px solid var(--line-2);}

/* MEMO inset — looks like the first page of an agency memo */
.memo{margin:2rem 0;background:#f6f3ea;border:0.5px solid #d8d0bb;box-shadow:4px 5px 0 rgba(60,55,40,0.08);position:relative;overflow:hidden;}
.memo-top{display:flex;align-items:stretch;border-bottom:1px solid #cfc6ad;background:#efe9d8;}
.memo-seal{display:flex;flex-direction:column;justify-content:center;gap:7px;padding:10px 16px;border-right:1px solid #cfc6ad;}
.memo-seal .ms-row{display:flex;align-items:center;gap:9px;}
.memo-seal .ms-ps{display:flex;align-items:center;gap:8px;padding-top:7px;border-top:1px solid #ddd5bf;}
.memo-seal .ms-ps svg{width:17px;height:17px;display:block;flex-shrink:0;}
.memo-seal .ms-pstxt{font-family:var(--mono);font-size:7.5px;line-height:1.35;letter-spacing:0.1em;color:#8a8268;}
.memo-seal .ms-mark{width:26px;height:26px;border:1.5px solid #8a8268;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.memo-seal .ms-mark i{width:9px;height:9px;background:#8a8268;border-radius:50%;display:block;font-style:normal;}
.memo-seal .ms-txt{font-family:var(--mono);font-size:9px;line-height:1.3;letter-spacing:0.08em;color:#6f6850;}
.memo-meta{display:flex;flex:1;flex-wrap:wrap;}
.memo-meta .mm{flex:1;min-width:84px;padding:8px 14px;border-right:1px solid #ddd5bf;}
.memo-meta .mm:last-child{border-right:none;}
.memo-meta .mm .mk{font-family:var(--mono);font-size:8.5px;letter-spacing:0.1em;color:#a0987e;display:block;margin-bottom:2px;}
.memo-meta .mm .mv{font-family:var(--mono);font-size:11px;color:#4d4836;}
.memo-class{background:#e7dcc4;border-bottom:1px solid #cfc6ad;padding:5px 16px;font-family:var(--mono);font-size:9px;letter-spacing:0.22em;color:#7a6f50;text-align:center;}
.memo-body{padding:1.5rem 1.7rem 1.2rem;}
.memo-doctitle{font-family:var(--serif);font-size:21px;color:#2c281d;margin:0 0 0.2rem;}
.memo-section{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:#8a8268;margin-bottom:1.1rem;}
.memo-body p{font-family:var(--serif);font-size:14px;line-height:1.68;color:#3a352a;margin:0 0 0.9rem;}
.memo-body p:last-of-type{margin-bottom:0;color:#5c5642;}
.memo-fade{height:64px;background:linear-gradient(to bottom,rgba(246,243,234,0),#f6f3ea);margin-top:-64px;position:relative;pointer-events:none;}
.memo-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-top:1px solid #cfc6ad;background:#efe9d8;}
.memo-foot span{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;color:#8a8268;}

/* NEWSPAPER front-page inset */
.news{margin:2rem 0;background:#efece2;border:0.5px solid #cfc8b6;box-shadow:4px 5px 0 rgba(60,55,40,0.08);position:relative;overflow:hidden;padding:1.5rem 1.6rem 0;}
.news-nameplate{text-align:center;border-bottom:3px double #2c281d;padding-bottom:8px;margin-bottom:0;}
.news-rule-line{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:9px;letter-spacing:0.12em;color:#6f6850;text-transform:uppercase;}
.news-title{font-family:var(--serif);font-weight:500;font-size:clamp(34px,6vw,52px);line-height:1;color:#211d16;letter-spacing:-0.01em;margin:4px 0 6px;}
.news-dateline{border-top:1px solid #cfc8b6;padding-top:6px;margin-top:2px;}
.news-strap{font-family:var(--serif);font-style:italic;font-size:14px;color:#4d4636;text-align:center;padding:9px 0;border-bottom:1px solid #cfc8b6;margin-bottom:14px;}
.news-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:0;}
.news-lead{padding-right:18px;border-right:1px solid #d4cdba;}
.news-side{padding-left:18px;}
.news-kicker{font-family:var(--mono);font-size:9px;letter-spacing:0.16em;color:#9a3a2a;margin-bottom:6px;}
.news-headline{font-family:var(--serif);font-weight:500;font-size:clamp(26px,4.4vw,38px);line-height:1.04;color:#1f1b14;margin:0 0 6px;}
.news-byline{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:#7a7359;margin-bottom:12px;}
.news-figure{position:relative;width:100%;height:200px;overflow:hidden;border:0.5px solid #bcb6a4;margin-bottom:4px;filter:saturate(0.7) contrast(1.05);}
.news-caption{font-family:var(--sans);font-size:10.5px;line-height:1.4;color:#6f6850;padding:5px 1px 12px;font-style:italic;}
.news-lead p{font-family:var(--serif);font-size:13.5px;line-height:1.6;color:#332f25;margin:0 0 0.7rem;text-align:justify;}
.news-drop{margin-top:0;}
.news-dropcap{float:left;font-family:var(--serif);font-weight:500;font-size:50px;line-height:0.82;padding:4px 8px 0 0;color:#1f1b14;}
.news-cont{font-family:var(--mono) !important;font-size:10px !important;letter-spacing:0.06em;color:#8a8268 !important;font-style:normal;text-align:left !important;}
.news-sidebox{border-bottom:1px solid #d4cdba;padding-bottom:14px;margin-bottom:14px;}
.news-subhead{font-family:var(--serif);font-weight:500;font-size:18px;line-height:1.15;color:#1f1b14;margin:0 0 4px;}
.news-oped-byline{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:#7a7359;margin-bottom:10px;}
.news-portrait{float:right;width:72px;height:84px;margin:2px 0 4px 12px;border:0.5px solid #bcb6a4;overflow:hidden;filter:saturate(0.65) contrast(1.05);}
.news-side p{font-family:var(--serif);font-size:12.5px;line-height:1.55;color:#3a352a;margin:0 0 0.65rem;}
.news-pull{font-family:var(--serif) !important;font-style:italic;font-size:15px !important;line-height:1.3 !important;color:#7a4f1c !important;border-left:2px solid #c9a35f;padding-left:10px;margin-top:10px !important;}
.news-list{list-style:none;margin:0;padding:0;}
.news-list li{font-family:var(--serif);font-size:12.5px;line-height:1.3;color:#3a352a;padding:7px 0;border-bottom:0.5px dotted #c4bca8;}
.news-list li:last-child{border-bottom:none;}
.news-fade{height:70px;margin:0 -1.6rem;background:linear-gradient(to bottom,rgba(239,236,226,0),#efece2);position:relative;pointer-events:none;}
@media(max-width:620px){
  .news-grid{grid-template-columns:1fr;}
  .news-lead{padding-right:0;border-right:none;}
  .news-side{padding-left:0;border-top:1px solid #d4cdba;margin-top:14px;padding-top:14px;}
}

/* TABLOID front-page inset */
.tabloid{margin:2rem 0;background:#fbfaf7;border:0.5px solid #d8d2c4;box-shadow:4px 5px 0 rgba(60,55,40,0.10);overflow:hidden;}
.tab-top{display:flex;align-items:center;justify-content:space-between;background:#b3261b;padding:8px 14px;}
.tab-flag{font-family:var(--sans);font-weight:600;font-size:27px;line-height:1;letter-spacing:-0.02em;color:#fff;text-transform:uppercase;}
.tab-price{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;color:#ffd9d4;text-transform:uppercase;}
.tab-screamer{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.18em;color:#b3261b;padding:11px 14px 0;}
.tab-head{font-family:var(--sans);font-weight:600;font-size:clamp(40px,9vw,72px);line-height:0.92;letter-spacing:-0.03em;color:#16130d;text-transform:uppercase;margin:1px 0 0;padding:0 12px;}
.tab-deck{font-family:var(--sans);font-weight:600;font-size:clamp(14px,2.6vw,19px);letter-spacing:0.01em;color:#b3261b;text-transform:uppercase;padding:7px 14px 13px;border-bottom:2px solid #16130d;}
.tab-body{display:grid;grid-template-columns:1.25fr 1fr;gap:16px;padding:14px;}
.tab-photo{position:relative;height:190px;overflow:hidden;border:0.5px solid #c8c2b2;filter:saturate(0.85);}
.tab-burst{position:absolute;right:8px;bottom:8px;width:94px;height:94px;border-radius:50%;background:#ffd21e;border:2.5px solid #16130d;color:#16130d;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transform:rotate(-8deg);font-family:var(--sans);font-weight:600;font-size:17px;line-height:0.9;box-shadow:2px 2px 0 rgba(0,0,0,0.16);}
.tab-burst span{font-size:8px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;margin-top:3px;}
.tab-col p{font-family:var(--serif);font-size:13px;line-height:1.5;color:#2a2620;margin:0 0 0.6rem;}
.tab-dropcap{float:left;font-family:var(--sans);font-weight:600;font-size:40px;line-height:0.78;padding:3px 7px 0 0;color:#b3261b;}
.tab-pull{font-family:var(--serif);font-style:italic;font-weight:500;font-size:15px;line-height:1.26;color:#16130d;border-left:3px solid #ffd21e;padding-left:10px;margin-top:8px;}
.tab-fade{height:54px;background:linear-gradient(to bottom,rgba(251,250,247,0),#fbfaf7);margin-top:-40px;position:relative;pointer-events:none;}
@media(max-width:620px){ .tab-body{grid-template-columns:1fr;} .tab-photo{height:170px;} }

/* CAMPAIGN LEAFLETS inset */
.leaflets{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:2rem 0;}
.leaflet{background:#fffdf8;border:0.5px solid #d8d2c4;box-shadow:4px 5px 0 rgba(60,55,40,0.10);overflow:hidden;display:flex;flex-direction:column;transform:rotate(-0.5deg);}
.leaflet.opp{transform:rotate(0.6deg);}
.lf-top{display:flex;align-items:center;gap:11px;padding:13px 14px;color:#fff;}
.leaflet.gov .lf-top{background:#5e3a9e;}
.leaflet.opp .lf-top{background:#5a626e;}
.lf-logo{width:46px;height:46px;flex-shrink:0;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;padding:6px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);}
.leaflet.gov .lf-logo{color:#5e3a9e;}
.leaflet.opp .lf-logo{color:#5a626e;}
.lf-party{font-family:var(--sans);font-weight:600;font-size:18px;line-height:1;letter-spacing:-0.01em;}
.lf-slogan{font-family:var(--mono);font-size:9px;letter-spacing:0.13em;text-transform:uppercase;margin-top:5px;opacity:0.92;}
.lf-pitch{font-family:var(--serif);font-style:italic;font-size:13.5px;line-height:1.42;padding:12px 14px 8px;}
.leaflet.gov .lf-pitch{color:#4a2f7a;}
.leaflet.opp .lf-pitch{color:#3f4854;}
.lf-promises{list-style:none;margin:0;padding:2px 14px 12px;flex:1;}
.lf-promises li{font-family:var(--sans);font-size:12px;line-height:1.32;padding:6px 0 6px 21px;position:relative;border-bottom:0.5px dotted #e0dac9;color:#3a352a;}
.lf-promises li:last-child{border-bottom:none;}
.lf-promises li::before{position:absolute;left:0;top:5px;font-size:11px;font-weight:700;}
.leaflet.gov .lf-promises li::before{content:"✓";color:#5e3a9e;}
.leaflet.opp .lf-promises li::before{content:"✗";color:#5a626e;}
.lf-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 14px;background:#faf8f3;border-top:0.5px solid #e6e0d2;}
.lf-vote{font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:0.04em;color:#fff;padding:3px 11px;}
.leaflet.gov .lf-vote{background:#5e3a9e;}
.leaflet.opp .lf-vote{background:#5a626e;}
.lf-promo{font-family:var(--mono);font-size:7.5px;letter-spacing:0.05em;color:#a89f88;text-align:right;line-height:1.3;}
@media(max-width:620px){ .leaflets{grid-template-columns:1fr;} .leaflet,.leaflet.opp{transform:none;} }

/* INVITATION inset */
.invite{margin:2rem 0;display:flex;justify-content:center;}
.invite-card{position:relative;background:#f7f1e3;border:1px solid #e3d8bf;box-shadow:0 2px 0 #efe6d2,0 3px 14px rgba(60,50,30,0.12);padding:2.6rem 2.4rem 2rem;max-width:430px;width:100%;text-align:center;}
.invite-card::before{content:"";position:absolute;inset:9px;border:0.5px solid #d8cbac;pointer-events:none;}
.invite-rule{width:34px;height:1px;background:#a98f5e;margin:0 auto 1.3rem;}
.invite-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:0.32em;color:#a08a5a;margin-bottom:1.4rem;}
.invite-host{font-family:var(--serif);font-size:26px;color:#2c2517;line-height:1.1;margin-bottom:0.5rem;}
.invite-host-sub{font-family:var(--serif);font-style:italic;font-size:12.5px;line-height:1.5;color:#6f6448;margin-bottom:1.4rem;}
.invite-cordially{font-family:var(--serif);font-style:italic;font-size:13px;color:#5c5440;margin-bottom:0.7rem;}
.invite-occasion{font-family:var(--serif);font-size:21px;line-height:1.25;color:#2c2517;letter-spacing:0.01em;margin-bottom:1.3rem;}
.invite-divider{color:#bfa877;font-size:13px;letter-spacing:0.3em;margin-bottom:1.3rem;}
.invite-details{font-family:var(--serif);font-size:12.5px;line-height:1.9;color:#4d4632;margin-bottom:1.4rem;display:inline-block;text-align:left;}
.invite-dk{display:inline-block;width:60px;font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;color:#a08a5a;}
.invite-foot{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;color:#9a8862;text-transform:uppercase;padding-top:1rem;border-top:0.5px solid #e3d8bf;}

/* technical detail expander */
.technote{border-top:0.5px solid var(--line);border-bottom:0.5px solid var(--line);margin:1.8rem 0;}
.technote-head{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;text-align:left;padding:1.05rem 0;}
.technote-head .tk{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--steel);flex-shrink:0;}
.technote-head .tt{font-family:var(--sans);font-size:13.5px;color:var(--ink-4);font-weight:500;}
.technote-head .tchev{margin-left:auto;font-size:17px;color:var(--faint);transition:transform .3s;flex-shrink:0;}
.technote.open .tchev{transform:rotate(180deg);}
.technote-body{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.technote.open .technote-body{max-height:1400px;}
.technote-inner{padding:0 0 1.2rem;}
.technote-inner p{font-family:var(--sans);font-size:13.5px;line-height:1.72;color:var(--ink-4);margin:0 0 0.85rem;}
.technote-inner p:last-child{margin-bottom:0;}

/* scene footer nav */
.scene-nav{display:flex;justify-content:space-between;align-items:stretch;margin-top:2.5rem;padding-top:1.5rem;border-top:0.5px solid var(--line);gap:12px;}
.snav-btn{font-family:var(--sans);font-size:14px;color:var(--ink-3);background:none;border:0.5px solid var(--line-2);cursor:pointer;padding:10px 18px;transition:background .2s,border-color .2s;display:flex;flex-direction:column;gap:2px;max-width:48%;}
.snav-btn:hover:not(:disabled){background:var(--paper-card);border-color:var(--muted);}
.snav-btn:disabled{opacity:0.3;cursor:default;}
.snav-btn .nd{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.08em;}
.snav-btn.next{text-align:right;align-items:flex-end;}
.scene-enter{animation:sceneEnter .55s ease both;}
@keyframes sceneEnter{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.scroll-cue{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:45;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:var(--paper);background:var(--navy);padding:8px 16px;border-radius:30px;opacity:0;pointer-events:none;transition:opacity .35s;box-shadow:0 4px 14px rgba(0,0,0,0.18);}
.scroll-cue.show{opacity:0.94;pointer-events:auto;cursor:pointer;}
.scroll-cue .cue-arrow{font-size:12px;animation:cueBob 1.4s ease-in-out infinite;}
@keyframes cueBob{0%,100%{transform:translateY(0);}50%{transform:translateY(3px);}}
.scene-progress{display:flex;align-items:center;gap:14px;margin-top:1.6rem;}
.sp-bars{display:flex;gap:6px;flex:1;}
.sp-bars .spb{flex:1;height:3px;background:var(--line-2);transition:background .3s;}
.sp-bars .spb.done{background:var(--clay);}
.sp-bars .spb.cur{background:var(--steel);}
.sp-count{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;color:var(--faint);white-space:nowrap;}

/* ledger */
.ledger{width:236px;flex-shrink:0;background:var(--paper-deep);border-left:0.5px solid var(--line);}
.ledger-pin{position:sticky;top:90px;padding:1.6rem 1.4rem;max-height:calc(100vh - 104px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line-2) transparent;}
.ledger-pin::-webkit-scrollbar{width:6px;}
.ledger-pin::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px;}
.ledger-bar{display:none;}
.ledger-head{display:flex;align-items:center;gap:7px;margin-bottom:1rem;}
.ledger-head i{width:5px;height:5px;background:var(--steel);display:block;font-style:normal;}
.ledger-head .lk{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:var(--muted);}
.ledger-head .lpin{margin-left:auto;font-family:var(--mono);font-size:9px;color:#b6ad96;letter-spacing:0.05em;}
.lrow{margin-bottom:0.9rem;}
.lrow .ll{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--muted);margin-bottom:4px;}
.lrow .lsub{font-size:9px;color:#a89a7a;margin-bottom:5px;line-height:1.3;}
.lrow .lv{font-family:var(--serif);font-size:24px;color:var(--ink);line-height:1;transition:color .4s;}
.lrow .lv .u{font-size:13px;color:var(--faint);}
.lrow.uninsured .lv{color:var(--clay-deep);} .lrow.uninsured .lv .u{color:#a88a5f;}
.lbar{height:3px;background:var(--line-2);margin-top:7px;}
.lbar span{display:block;height:3px;background:var(--steel);transition:width .6s ease;}
.lrow.uninsured .lbar span{background:var(--clay);}
.lyear .lv{font-size:26px;}
.infra-track{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.infra-step{font-family:var(--sans);font-size:11px;color:#c9bfa3;transition:all .3s;}
.infra-step.passed{color:#a89a7a;text-decoration:line-through;}
.infra-step.current{font-size:13px;font-weight:500;padding:2px 8px;border:0.5px solid;}
.infra-step.current.nominal{color:var(--sage);background:var(--sage-bg);border-color:var(--sage-line);}
.infra-step.current.strained{color:var(--clay-deep);background:var(--clay-bg);border-color:var(--clay-line);}
.infra-step.current.failing{color:var(--alarm);background:var(--alarm-bg);border-color:var(--alarm-line);}
.infra-arrow{color:#d8cdb0;font-size:10px;}
.ledger-spark{border-top:0.5px solid var(--line-2);padding-top:0.9rem;margin-top:0.3rem;}
.spark-k{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;color:#a89a7a;margin-bottom:7px;}
.spark-bars{display:flex;align-items:flex-end;gap:3px;height:36px;}
.spark-bars .sb{flex:1;background:#d8cdb0;transition:height .4s,background .4s,opacity .4s;}
.spark-here{font-family:var(--mono);font-size:9px;color:#b6ad96;margin-top:5px;}
/* ledger — economic indicators, polling, combined losses, news ticker */
.lrow.econ .lfig{display:flex;align-items:baseline;gap:6px;}
.lrow.econ .lv{font-size:20px;}
.lfig .u{font-family:var(--mono);font-size:11px;color:var(--faint);}
.ld{font-family:var(--mono);font-size:10.5px;letter-spacing:0.02em;white-space:nowrap;}

}

/* ---- story-map connector lines (computed from rendered node positions) ---- */
const FLOW_EDGES=[
  [0,1],[0,2],[0,3],[0,4],
  [1,5],[2,5],[3,5],[4,5],
  [5,6],
  [6,"good"],[6,"bad"]
];
function flowNode(ref){
  if(ref==="good")return document.querySelector('.onode.good');
  if(ref==="bad")return document.querySelector('.onode.bad');
  return document.querySelector('.node[data-scene="'+ref+'"]');
}
function drawFlowLinks(){
  const flow=document.getElementById("flow");
  const svg=document.getElementById("flowLinks");
  if(!flow||!svg)return;
  const fr=flow.getBoundingClientRect();
  if(fr.width===0)return;
  svg.setAttribute("viewBox",`0 0 ${fr.width} ${fr.height}`);
  let paths="";
  FLOW_EDGES.forEach(([a,b])=>{
    const ea=flowNode(a),eb=flowNode(b);
    if(!ea||!eb)return;
    const ra=ea.getBoundingClientRect(),rb=eb.getBoundingClientRect();
    const x1=ra.left+ra.width/2-fr.left, y1=ra.bottom-fr.top;
    const x2=rb.left+rb.width/2-fr.left, y2=rb.top-fr.top;
    const my=(y1+y2)/2;
    paths+=`<path d="M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}" fill="none" stroke="#cfc6ad" stroke-width="1.25"/>`;
  });
  svg.innerHTML=paths;
}
window.addEventListener("resize",()=>{ if($("#landing")&&!$("#landing").classList.contains("hidden")) drawFlowLinks(); });
if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>{ if($("#landing")&&!$("#landing").classList.contains("hidden")) drawFlowLinks(); }); }

/* ---- ledger ---- */
const POLL_SCALE=45, LOSS_MAX=58;
const PARTIES=[["gov","GOVERNMENT"],["opp","MAINSTREAM OPPOSITION"],["far","FAR RIGHT"],["left","FAR LEFT"]];
function deltaHTML(n,dec,id,invert){
  const v=Math.abs(n).toFixed(dec);
  let cls="fl",ar="&ndash;";
  if(n>0){cls=invert?"dn":"up";ar="&#9650;";} else if(n<0){cls=invert?"up":"dn";ar="&#9660;";}
  return `<span class="ld ${cls}"${id?` id="${id}"`:""}>${ar} ${v}</span>`;
}
function setDelta(id,n,dec,invert){const el=document.getElementById(id);if(el)el.outerHTML=deltaHTML(n,dec,id,invert);}
function infraHTML(n){
  return INFRA.map((word,idx)=>{
    let cls="infra-step";const step=idx+1;
    if(step<n)cls="infra-step passed"; else if(step===n)cls="infra-step current "+word;
    const arrow=idx<INFRA.length-1?'<span class="infra-arrow">&rarr;</span>':"";
    return `<span class="${cls}">${word}</span>${arrow}`;
  }).join("");
}
function pollW(pct){return Math.min(100,pct/POLL_SCALE*100);}
function lossW(v){return v?Math.min(100,v/LOSS_MAX*100):0;}
function tickerTrack(list){
  if(!list||!list.length)return "";
  const half=list.map(t=>`<span class="thl">${t}</span><span class="sep">&#9670;</span>`).join("");
  return half+half; /* duplicated so the -50% keyframe loops seamlessly */
}
function pollRow(d,key,label,wi){
  const pct=d.poll[key][0],dl=d.poll[key][1],inv=(key==="gov");
  const fig = wi
    ? `<b id="poll_${key}">${pct}</b>% ${deltaHTML(dl,0,"poll_"+key+"_d",inv)}`
    : `<b>${pct}</b>% ${deltaHTML(dl,0,null,inv)}`;
  return `<div class="poll-row"><div class="poll-top"><span class="poll-name">${label}</span><span class="poll-fig">${fig}</span></div>`+
    `<div class="poll-bar"><span class="pb ${key}"${wi?` id="poll_${key}_bar"`:""} style="width:${pollW(pct)}%"></span></div></div>`;
}
function lossFig(v){return v!=null?v.toFixed(1)+"bn":"&mdash;";}
function fyLabel(y){var n=parseInt(y,10);return n+"/"+String((n+1)%100).padStart(2,"0");}
function ftile(label,unit,valId,val,wi){
  return `<div class="ftile"><div class="ft-k">${label}</div>`+
    `<div class="ft-v"><span${wi?` id="${valId}"`:""}>${val}</span><span class="ft-u">${unit}</span></div></div>`;
}
function ledgerMarkup(d,wi,ticker){
  let h=`<div class="ledger-head"><i></i><span class="lk">THE LEDGER</span>${wi?"":'<span class="lpin">BASELINE</span>'}</div>`;
  h+=`<div class="lrow lyear"><div class="ll">YEAR</div><div class="lv"${wi?' id="L_year"':""}>${d.year}</div><div class="lsub"${wi?' id="L_sub"':""}>${d.sub}</div></div>`;
  /* News — ticker only; self-explanatory, so no section header */
  h+=`<div class="ticker"><span class="ticker-tag">LIVE</span><div class="ticker-win"><div class="ticker-track"${wi?' id="L_ticker"':""}>${tickerTrack(ticker)}</div></div></div>`;
  /* Fiscal health */
  h+=`<div class="lsection">Fiscal health</div>`;
  h+=`<div class="ftiles">`+
     ftile("National debt","% GDP","L_debt",d.debt.toFixed(0),wi)+
     ftile(`Budget deficit <span${wi?' id="L_defYr"':''}>${fyLabel(d.year)}</span>`,"% GDP","L_def",d.deficit.toFixed(1),wi)+
     ftile("10-year yield","%","L_yld",d.yield10.toFixed(1),wi)+
     ftile("Inflation","%","L_infl",d.inflation.toFixed(1),wi)+
     `</div>`;
  /* Popularity */
  h+=`<div class="lsection">Popularity</div>`;
  h+=`<div class="lrow poll">`+PARTIES.map(p=>pollRow(d,p[0],p[1],wi)).join("")+`</div>`;
  /* Climate impacts */
  h+=`<div class="lsection">Climate impacts</div>`;
  h+=`<div class="lrow infra"><div class="ll">CRITICAL INFRASTRUCTURE</div><div class="infra-track"${wi?' id="L_infra"':""}>${infraHTML(d.infra)}</div></div>`;
  h+=`<div class="lrow loss"><div class="ll">LOSSES SINCE 2029</div>`+
     `<div class="lossbar"><span class="ls-ins"${wi?' id="L_insbar"':""} style="width:${lossW(d.ins)}%"></span><span class="ls-unins"${wi?' id="L_uninsbar"':""} style="width:${lossW(d.unins)}%"></span></div>`+
     `<div class="loss-legend"><span class="lg ins"><i></i>INS&nbsp;<b${wi?' id="L_ins"':""}>${lossFig(d.ins)}</b></span>`+
     `<span class="lg unins"><i></i>UNINS&nbsp;<b${wi?' id="L_unins"':""}>${lossFig(d.unins)}</b></span></div></div>`;
  return h;
}
function paintLedger(i){
  const sc=D.scenes[i],Lg=sc.ledger;
  $("#L_year").textContent=Lg.year;
  $("#ledgerBarYear").textContent=Lg.year;
  $("#L_sub").textContent=sc.title;
  $("#L_debt").textContent=Lg.debt.toFixed(0);
  $("#L_def").textContent=Lg.deficit.toFixed(1); $("#L_defYr").textContent=fyLabel(Lg.year);
  $("#L_yld").textContent=Lg.yield10.toFixed(1);
  $("#L_infl").textContent=Lg.inflation.toFixed(1);
  PARTIES.forEach(p=>{const k=p[0],a=Lg.poll[k];
    $("#poll_"+k).textContent=a[0];
    $("#poll_"+k+"_bar").style.width=pollW(a[0])+"%";
    setDelta("poll_"+k+"_d",a[1],0,k==="gov");
  });
  $("#L_infra").innerHTML=infraHTML(Lg.infra);
  $("#L_insbar").style.width=lossW(Lg.ins)+"%";
  $("#L_uninsbar").style.width=lossW(Lg.unins)+"%";
  $("#L_ins").innerHTML=lossFig(Lg.ins);
  $("#L_unins").innerHTML=lossFig(Lg.unins);
  $("#L_ticker").innerHTML=tickerTrack(D.tickers[sc.id]);
  document.querySelectorAll("#railBars .rb").forEach((rb,idx)=>{rb.className="rb"+(idx<i?" done":idx===i?" cur":"");});
  const spBars=$("#spBars");

  }
  document.querySelectorAll("#spBars .spb").forEach((spb,idx)=>{spb.className="spb"+(idx<i?" done":idx===i?" cur":"");});
  $("#spCount").innerHTML=`${i+1} of 7`;
  const nx=D.scenes[i+1];
  $("#railNext").innerHTML=nx?("Next: "+nx.title+" &rarr;"):"Then: the outcomes &rarr;";
}

/* ---- scene ---- */
function openScene(i,atBottom){
  current=i;const sc=D.scenes[i];
  $("#resources").classList.remove("active");
  $("#landing").classList.add("hidden");
  $("#ending").classList.remove("active");
  $("#reader").classList.add("active");
  $("#homeBtn").classList.remove("active");$("#resourcesBtn").classList.remove("active");
  $("#sceneNum").innerHTML="SCENE "+ROMAN[i];
  $("#sceneTitle").innerHTML=sc.title;
  const body=$("#sceneBody");body.innerHTML="";
  sc.body.forEach((item,idx)=>{
    if(typeof item==="object"){
      if(item.memo){body.insertAdjacentHTML("beforeend",renderMemo());return;}
      if(item.paper){body.insertAdjacentHTML("beforeend",renderNewspaper());return;}
      if(item.invite){body.insertAdjacentHTML("beforeend",renderInvite());return;}
      if(item.tabloid){body.insertAdjacentHTML("beforeend",renderTabloid());return;}
      if(item.leaflets){body.insertAdjacentHTML("beforeend",renderLeaflets());return;}
      if(item.italic){const el=document.createElement("p");el.className="italic";el.innerHTML=item.italic;body.appendChild(el);return;}
    }
    const el=document.createElement("p");
    if(idx===0)el.className="lead";
    el.innerHTML=item;body.appendChild(el);
  });
  if(sc.tech&&sc.tech.body&&sc.tech.body.length){
    const wrap=document.createElement("div");wrap.className="technote";
    wrap.innerHTML=`<button class="technote-head"><span class="tk">TECHNICAL DETAIL</span><span class="tt">${sc.tech.title}</span><span class="tchev">&#8964;</span></button><div class="technote-body"><div class="technote-inner">${sc.tech.body.map(t=>`<p>${t}</p>`).join("")}</div></div>`;
    body.appendChild(wrap);
    wrap.querySelector(".technote-head").addEventListener("click",()=>wrap.classList.toggle("open"));
  }
  if(i===D.scenes.length-1){
    const oc=document.createElement("div");oc.className="outcome-choose";
    oc.innerHTML=`<div class="oc-k">HOW DOES IT PLAY OUT? &mdash; CHOOSE AN OUTCOME</div><div class="oc-row">`+
      `<button class="eswitch-btn good" data-ending="good"><div class="es-cond">IF IT COMPOUNDS</div><div class="es-name">${D.endings.good.label}</div></button>`+
      `<button class="eswitch-btn bad" data-ending="bad"><div class="es-cond">IF IT UNRAVELS</div><div class="es-name">${D.endings.bad.label}</div></button>`+
      `</div>`;
    body.appendChild(oc);
    oc.querySelectorAll("[data-ending]").forEach(b=>b.addEventListener("click",()=>openEnding(b.dataset.ending)));
  }
  const prev=$("#prevBtn"),next=$("#nextBtn");
  if(i>0){prev.disabled=false;$("#prevLabel").textContent=D.scenes[i-1].title;}else{prev.disabled=true;$("#prevLabel").textContent="\u2014";}
  if(i<D.scenes.length-1){$("#nextLabel").textContent=D.scenes[i+1].title;}else{$("#nextLabel").textContent="The outcomes";}
  paintLedger(i);
  if(atBottom){window.scrollTo({top:document.documentElement.scrollHeight,behavior:"instant"});}
  else{window.scrollTo({top:0,behavior:"instant"});}
  const rc=document.querySelector(".read-col");
  if(rc){rc.classList.remove("scene-enter");void rc.offsetWidth;rc.classList.add("scene-enter");}
  updateCue(i);
  hideCue();
  scrollArmed=false;
  setTimeout(()=>{scrollArmed=true;},650);
}
let scrollArmed=true;
let scrollAdvancing=false;
function cueEl(){return document.getElementById("scrollCue");}
function updateCue(i){
  const c=cueEl();if(!c)return;
  const label = i<D.scenes.length-1 ? D.scenes[i+1].title : "The outcomes";
  c.querySelector(".cue-label").textContent="Continue: "+label;
}
function showCue(){const c=cueEl();if(c)c.classList.add("show");}
function hideCue(){const c=cueEl();if(c)c.classList.remove("show");}
function advanceScene(){
  if(scrollAdvancing)return;
  if(current>=D.scenes.length-1)return; // last scene: never auto-advance into an ending
  scrollAdvancing=true;hideCue();
  openScene(current+1);
  setTimeout(()=>{scrollAdvancing=false;},150);
}
function retreatScene(){
  if(scrollAdvancing)return;
  scrollAdvancing=true;hideCue();
  if(current>0){openScene(current-1,true);}else{goHome();}
  setTimeout(()=>{scrollAdvancing=false;},150);
}
let atBottomSince=0, overUp=0, overUpTimer=null;
function onReaderScroll(){
  if(!$("#reader").classList.contains("active")){hideCue();return;}
  if(scrollAdvancing||!scrollArmed)return;
  if(current>=D.scenes.length-1){hideCue();return;} // no auto-cue into the endings
  const reader=$("#reader");
  const rect=reader.getBoundingClientRect();
  const remaining=rect.bottom-window.innerHeight;
  if(remaining<150){showCue();}else{hideCue();atBottomSince=0;}
}
// deliberate overscroll intent: down at the bottom -> next scene; up at the top -> previous scene / home
function onWheelIntent(e){
  if(!$("#reader").classList.contains("active"))return;
  if(scrollAdvancing||!scrollArmed)return;
  const reader=$("#reader");
  if(e.deltaY>0){
    overUp=0;
    const remaining=reader.getBoundingClientRect().bottom-window.innerHeight;
    if(remaining<4){
      const now=Date.now();
      if(atBottomSince===0){atBottomSince=now;return;}
      if(now-atBottomSince>120){advanceScene();atBottomSince=0;}
    }else{atBottomSince=0;}
  }else if(e.deltaY<0){
    atBottomSince=0;
    if((window.scrollY||document.documentElement.scrollTop||0)<2){
      var dy=e.deltaY; if(e.deltaMode===1)dy*=16; else if(e.deltaMode===2)dy*=window.innerHeight;
      overUp+=-dy;                                       // accumulate overscroll past the top
      if(overUpTimer)clearTimeout(overUpTimer);
      overUpTimer=setTimeout(function(){overUp=0;},250); // forget the buildup if the reader pauses
      if(overUp>120){overUp=0;retreatScene();}
    }else{overUp=0;}
  }
}
window.addEventListener("scroll",onReaderScroll,{passive:true});
window.addEventListener("wheel",onWheelIntent,{passive:true});
document.getElementById("scrollCue").addEventListener("click",advanceScene);
/* mobile: the scene ledger lives under the chapter title as a collapsible card; desktop: side rail */
const ledgerMQ=window.matchMedia("(max-width:880px)");
function placeLedger(){
  const aside=$("#sceneLedger");if(!aside)return;
  if(ledgerMQ.matches){ $("#sceneTitle").insertAdjacentElement("afterend",aside); }
  else{ document.querySelector("#reader .read-wrap").appendChild(aside); aside.classList.remove("open"); $("#ledgerBar").setAttribute("aria-expanded","false"); }
}
if(ledgerMQ.addEventListener)ledgerMQ.addEventListener("change",placeLedger);else ledgerMQ.addListener(placeLedger);
placeLedger();
$("#ledgerBar").addEventListener("click",()=>{
  const open=$("#sceneLedger").classList.toggle("open");
  $("#ledgerBar").setAttribute("aria-expanded",open?"true":"false");
});
$("#prevBtn").addEventListener("click",()=>{if(current>0)openScene(current-1);});
$("#nextBtn").addEventListener("click",()=>{if(current<D.scenes.length-1){openScene(current+1);}else{const oc=document.querySelector(".outcome-choose");if(oc)oc.scrollIntoView({behavior:"smooth",block:"center"});}});

/* ---- ending ---- */
function openEnding(which){
  const E=D.endings[which];
  if(typeof hideCue==="function")hideCue();
  $("#resources").classList.remove("active");
  $("#landing").classList.add("hidden");
  $("#reader").classList.remove("active");
  const e=$("#ending");e.classList.add("active");e.classList.remove("good","bad");e.classList.add(which);
  $("#eKicker").innerHTML=(which==="good"?"IF IT COMPOUNDS":"IF IT UNRAVELS");
  $("#eTitle").innerHTML=E.label;
  const eb=$("#eBody");eb.innerHTML="";
  E.body.forEach(item=>{
    if(typeof item==="object"&&item.italicLead){
      const el=document.createElement("p");el.className="lead";el.innerHTML="<em>"+item.italicLead+"</em>"+item.rest;eb.appendChild(el);return;
    }
    const el=document.createElement("p");el.innerHTML=item;eb.appendChild(el);
  });
  const sw=$("#eSwitch");sw.innerHTML="";
  const other=which==="good"?"bad":"good";
  const ob=document.createElement("button");ob.className="eswitch-btn "+other;
  ob.innerHTML=`<div class="es-cond">${other==="good"?"IF IT COMPOUNDS":"IF IT UNRAVELS"}</div><div class="es-name">Read the other ending: ${D.endings[other].label}</div>`;
  ob.addEventListener("click",()=>openEnding(other));sw.appendChild(ob);
  const rb=document.createElement("button");rb.className="eswitch-btn restart";
  rb.innerHTML=`<div class="es-cond">START OVER</div><div class="es-name">Return to the file</div>`;
  rb.addEventListener("click",goHome);sw.appendChild(rb);
  window.scrollTo({top:0,behavior:"instant"});
}

function showPage(which){
  if(typeof hideCue==="function")hideCue();
  ["landing","reader","ending","resources"].forEach(id=>{
    const el=$("#"+id);
    if(id==="landing"){el.classList.toggle("hidden",which!=="landing");}
    else{el.classList.toggle("active",id===which);}
  });
  $("#homeBtn").classList.toggle("active",which==="landing");
  $("#resourcesBtn").classList.toggle("active",which==="resources");
  window.scrollTo({top:0,behavior:"instant"});
  if(which==="landing"&&typeof drawFlowLinks==="function"){ setTimeout(drawFlowLinks,30); }
}
function goHome(){ showPage("landing"); }

function buildResources(){
  const csHtml = D.complexSystems.map(item=>{
    if(typeof item==="object"&&item.quote){
      return `<blockquote>${item.quote}<span style="display:block;font-family:var(--mono);font-style:normal;font-size:11px;color:var(--faint);margin-top:0.7rem;letter-spacing:0.05em;">&mdash; Leonard Read, &lsquo;I, Pencil&rsquo;, 1958</span></blockquote>`;
    }
    return `<p>${item}</p>`;
  }).join("");
  const giHtml = D.getInvolved.map(p=>`<p>${p}</p>`).join("");
  $("#resources").innerHTML=`<div class="res-inner">
    <div class="res-kicker">RESOURCES</div>
    <h2 class="res-title">Get involved &amp; learn more</h2>
    <p class="res-intro">A growing set of resources to go deeper on the science, the politics, and what individuals can do. More to come.</p>
    <div class="res-section">
      <h3>Get involved</h3>
      ${giHtml}
      <div class="form-grid" style="margin-top:1.25rem;">
        <div class="field"><label for="cName">NAME</label><input id="cName" type="text" placeholder="Your name"></div>
        <div class="field"><label for="cEmail">EMAIL</label><input id="cEmail" type="email" placeholder="you@example.com"></div>
        <div class="field"><label for="cMsg">MESSAGE</label><textarea id="cMsg" rows="4" placeholder="What would you like to tell us?"></textarea></div>
        <button class="form-submit" id="cSubmit">Send</button>
        <p class="form-note" id="cNote">Placeholder form &mdash; not yet wired to a backend.</p>
      </div>
    </div>
    <div class="res-section">
      <h3>A note on complex systems</h3>
      ${csHtml}
    </div>
    <div class="res-section">
      <h3>Further reading</h3>
      <div class="res-placeholder">Placeholder &mdash; reading list, data sources, and links to come.</div>
    </div>
  </div>`;
  $("#cSubmit").addEventListener("click",()=>{
    const n=$("#cName").value.trim(),e=$("#cEmail").value.trim();
    $("#cNote").innerHTML=(n&&e)?"Thanks &mdash; placeholder form; nothing was sent yet.":"Add a name and email. (Placeholder form &mdash; not yet wired to a backend.)";
  });
}

$("#homeBtn").addEventListener("click",goHome);
$("#resourcesBtn").addEventListener("click",()=>showPage("resources"));
/* footnote links that open an annex block (e.g. "Annex II" -> AMOC briefing) */
document.addEventListener("click",e=>{
  const a=e.target.closest("[data-fn-annex]");
  if(!a)return;
  e.preventDefault();
  const fb=document.getElementById(a.dataset.fnAnnex);
  if(!fb)return;
  fb.classList.add("open");
  fb.scrollIntoView({behavior:"smooth",block:"start"});
  if(document.activeElement)document.activeElement.blur();
});

buildLanding();
buildResources();
$("#ledgerPin").innerHTML=ledgerMarkup(D.scenes[0].ledger,true,D.tickers[D.scenes[0].id]);
$("#homeBtn").classList.add("active");
</script>
<script>
/* ---- access gate (soft, client-side curtain) ---- */
(function(){
  var PW = "brine-saline-5991";
  var KEY = "wtss_gate_ok";
  var gate = document.getElementById("gate");
  var frame = document.getElementById("frame");
  var input = document.getElementById("gateInput");
  var btn = document.getElementById("gateBtn");
  var err = document.getElementById("gateErr");
  function unlock(){
    try{ sessionStorage.setItem(KEY,"1"); }catch(e){}
    gate.style.display = "none";
    frame.style.display = "";
    if(typeof drawFlowLinks==="function"){ setTimeout(drawFlowLinks,40); }
  }
  // already unlocked this session?
  var ok = false;
  try{ ok = sessionStorage.getItem(KEY) === "1"; }catch(e){}
  if(ok){ unlock(); }
  else { frame.style.display = "none"; gate.style.display = "flex"; setTimeout(function(){ input.focus(); }, 50); }
  function attempt(){
    if(input.value === PW){ err.textContent=""; unlock(); }
    else { err.textContent = "That code isn\u2019t right. Try again."; input.select(); }
  }
  btn.addEventListener("click", attempt);
  input.addEventListener("keydown", function(e){ if(e.key==="Enter") attempt(); });
})();
</script>
